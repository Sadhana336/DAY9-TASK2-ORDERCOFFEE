<!DOCTYPE html>
<html>
<head>
    <title>Midnight Mug Cafe</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5e6d3;
            text-align:center;
        }

        .header{
            background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center center/cover;
            height:350px;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-shadow:2px 2px 5px black;
        }

        .header h1{
            font-size:50px;
            margin:0;
        }

        .header p{
            font-size:22px;
        }

        form{
            margin:30px;
        }

        input{
            padding:10px;
            width:250px;
            border-radius:8px;
            border:1px solid gray;
        }

        button{
            padding:10px 20px;
            background:#6f4e37;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#4e342e;
        }

        h2{
            color:#6f4e37;
        }

        #coffeeList{
            list-style:none;
            padding:0;
        }

        #coffeeList li{
            background:white;
            width:300px;
            margin:10px auto;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 8px gray;
            font-size:18px;
        }

        .footer{
            background:#6f4e37;
            color:white;
            padding:15px;
            margin-top:30px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>☕ MIDNIGHT MUG CAFE</h1>
    <p><i>Where every cup tells a story and every sip feels like home</i></p>
</div>

<form id="coffeeForm">
    <input
            type="text"
            id="type"
            placeholder="Enter Customer name">

    <input
            type="text"
            id="type"
            placeholder="Enter Coffee Type">

    <button type="submit">
        Order Coffee
    </button>
    <button type="submit">
        Get id
    </button>

</form>

<h2>Coffee Orders</h2>

<ul id="coffeeList"></ul>

<div class="footer">
    © 2026 Midnight Mug Cafe | Brewed With Love ☕
</div>

<script>
    let count=0;
    const form = document.getElementById("coffeeForm");
    const list = document.getElementById("coffeeList");

    // Load all existing orders
    fetch("/coffee")
        .then(res => res.json())
        .then(data => data.forEach(order => addCoffee(order)));
//WHEN EVENT RUNS,THIS WILL LISTEN
    form.addEventListener("submit", e => {

        e.preventDefault();

        const type = document.getElementById("type").value;

        fetch("/coffee/" + type, {
            method: "POST"
        })
            .then(res => res.text())
            .then(msg => {

                addCoffee(type);

            });

        form.reset();

    });

    function addCoffee(order){

        const li = document.createElement("li");

        li.textContent = "☕ " + order;

        list.appendChild(li);

    }

</script>

</body>
</html>
